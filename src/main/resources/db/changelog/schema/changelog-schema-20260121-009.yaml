databaseChangeLog:
  - changeSet:
      id: 20260121-009-default-total-price
      author: codex
      changes:
        - addDefaultValue:
            tableName: booking_items
            columnName: total_price
            defaultValueNumeric: 0
        - update:
            tableName: booking_items
            columns:
              - column:
                  name: total_price
                  valueComputed: subtotal
            where: total_price IS NULL

databaseChangeLog:
  - changeSet:
      id: 20260121-004-schema-add-booking-payment-fields
      author: codex
      context: base
      labels: schema
      changes:
        - addColumn:
            tableName: bookings
            columns:
              - column:
                  name: payment_bank
                  type: VARCHAR(20)
              - column:
                  name: payment_unique_code
                  type: INTEGER
              - column:
                  name: payment_amount
                  type: DECIMAL(12,2)
              - column:
                  name: payment_proof_url
                  type: VARCHAR(500)
              - column:
                  name: payment_proof_status
                  type: VARCHAR(20)
              - column:
                  name: payment_proof_uploaded_at
                  type: TIMESTAMP
              - column:
                  name: payment_verified_at
                  type: TIMESTAMP
              - column:
                  name: payment_verified_by
                  type: BIGINT
              - column:
                  name: payment_verification_note
                  type: VARCHAR(500)

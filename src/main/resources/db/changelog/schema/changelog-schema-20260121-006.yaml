databaseChangeLog:
  - changeSet:
      id: 20260121-006-merchant-bank-accounts
      author: codex
      labels: schema
      changes:
        - createTable:
            tableName: merchant_bank_accounts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: merchant_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: bank_code
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: account_name
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: account_number
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(100)
              - column:
                  name: updated_by
                  type: VARCHAR(100)
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
